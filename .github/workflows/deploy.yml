name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'portal/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'portal/**'

env:
  AZURE_WEBAPP_NAME: baddybashportal     # App Service in rg-baddybash (VS Enterprise sub)
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────
  # Build & lint (runs on every push and PR)
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (standalone)
        run: npm run build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_GITHUB_ID: ${{ secrets.AUTH_GITHUB_ID }}
          AUTH_GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET }}
          COSMOS_ENDPOINT: ${{ secrets.COSMOS_ENDPOINT }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
          COSMOS_DATABASE: ${{ secrets.COSMOS_DATABASE }}

      # Package standalone output for deployment
      - name: Prepare standalone package
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: standalone
          path: portal/.next/standalone
          include-hidden-files: true
          retention-days: 1

  # ──────────────────────────────────────────────
  # Deploy to Azure App Service (main branch only)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: standalone
          path: standalone

      - name: Debug - list deployed files
        run: |
          echo "=== Top level ==="
          ls -la standalone/
          echo "=== .next dir ==="
          ls -la standalone/.next/ || echo ".next NOT FOUND"
          echo "=== BUILD_ID ==="
          cat standalone/.next/BUILD_ID || echo "BUILD_ID NOT FOUND"

      - name: Deploy to Azure App Service
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: standalone
